    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            color: white;
        }

        /* card */

        .card {
            width: 350px;
            padding: 40px 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            box-shadow: 0 0px 80px rgba(0, 0, 0, .6);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0)
            }
            50% {
                transform: translateY(-10px)
            }
        }

        .profile {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .text {
            font-size: 14px;
            line-height: 1.6;
            opacity: .9;
            margin-bottom: 25px;
        }

        /* button */

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 15px 32px;
            border-radius: 50px;
            background: linear-gradient(45deg, #6366f1, #06b6d4);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            position: relative;
            transition: .4s;
            overflow: hidden;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #06b6d4;
        }

        /* sparkle animation */

        .btn span {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: spark 3s infinite;
        }

        .btn span:nth-child(1) {
            top: -10px;
            left: 20%
        }

        .btn span:nth-child(2) {
            top: -10px;
            left: 50%;
            animation-delay: 1s
        }

        .btn span:nth-child(3) {
            top: -10px;
            left: 80%;
            animation-delay: 2s
        }

        @keyframes spark {
            0% {
                transform: translateY(0);
                opacity: 1
            }
            100% {
                transform: translateY(-40px);
                opacity: 0
            }
        }

        /* countdown */

        .timer {
            margin-top: 15px;
            font-size: 13px;
            opacity: .8;
        }

        /* disclaimer */

        .disclaimer {
            margin-top: 20px;
            font-size: 11px;
            opacity: .6;
            text-align: center;
        }

        .ads {
            margin-top: 6px;
            font-size: 12px;
            text-align: center;
        }

        .ads a {
            color: #22c55e;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
